name: Auto Blog Post (Daily)

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 오전 6시 KST (UTC 21:00 전날)
  workflow_dispatch:
    inputs:
      count:
        description: '발행할 글 수'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (저장 안 함)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto posting
        run: |
          COUNT=${{ github.event.inputs.count || '3' }}
          DRY=${{ github.event.inputs.dry_run || 'false' }}

          if [ "$DRY" = "true" ]; then
            python3 hanain/auto_post_gemini.py --count $COUNT --dry-run
          else
            python3 hanain/auto_post_gemini.py --count $COUNT
          fi

      - name: Done
        run: echo "✅ 블로그 자동 포스팅 완료 - https://phlorotannin.com/blog"
